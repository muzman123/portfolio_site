<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resume – Muhammad Muzammil</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;500;600&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0d0d1a;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            color: #fff;
            overflow-x: hidden;
        }

        /* Aurora background */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(ellipse 80% 50% at 20% 40%, rgba(10, 40, 35, 0.4), transparent),
                radial-gradient(ellipse 60% 40% at 80% 60%, rgba(15, 35, 50, 0.3), transparent),
                radial-gradient(ellipse 50% 30% at 50% 80%, rgba(50, 180, 160, 0.06), transparent);
            animation: aurora 12s ease-in-out infinite alternate;
            pointer-events: none;
            z-index: 0;
        }

        @keyframes aurora {
            0% { filter: hue-rotate(0deg); opacity: 0.8; }
            100% { filter: hue-rotate(30deg); opacity: 1; }
        }

        /* Film grain */
        body::after {
            content: '';
            position: fixed;
            inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
            pointer-events: none;
            z-index: 0;
        }

        .header {
            width: 100%;
            max-width: 1000px;
            padding: 24px 32px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: relative;
            z-index: 1;
        }

        .back-link {
            display: flex;
            align-items: center;
            gap: 8px;
            text-decoration: none;
            color: rgba(255, 255, 255, 0.6);
            font-family: 'Roboto Mono', monospace;
            font-size: 0.78rem;
            padding: 8px 16px;
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(12px);
            transition: all 0.2s;
        }

        .back-link:hover {
            background: rgba(255, 255, 255, 0.12);
            color: #fff;
            border-color: rgba(255, 255, 255, 0.2);
        }

        .back-link svg {
            width: 16px;
            height: 16px;
        }

        .actions {
            display: flex;
            gap: 10px;
        }

        .download-btn {
            display: flex;
            align-items: center;
            gap: 8px;
            text-decoration: none;
            color: #fff;
            font-family: 'Roboto Mono', monospace;
            font-size: 0.78rem;
            font-weight: 500;
            padding: 8px 18px;
            border-radius: 10px;
            background: rgba(50, 180, 160, 0.25);
            border: 1px solid rgba(50, 180, 160, 0.35);
            backdrop-filter: blur(12px);
            transition: all 0.2s;
        }

        .download-btn:hover {
            background: rgba(50, 180, 160, 0.4);
            border-color: rgba(50, 180, 160, 0.5);
            transform: translateY(-1px);
        }

        .title-section {
            text-align: center;
            padding: 20px 0 16px;
            position: relative;
            z-index: 1;
        }

        .title-section h1 {
            font-size: 1.3rem;
            font-weight: 600;
            letter-spacing: -0.02em;
            margin-bottom: 4px;
        }

        .title-section p {
            font-family: 'Roboto Mono', monospace;
            font-size: 0.7rem;
            color: rgba(255, 255, 255, 0.4);
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }

        .container {
            flex: 1;
            width: 100%;
            max-width: 1000px;
            padding: 0 32px 32px;
            position: relative;
            z-index: 1;
        }

        .pdf-card {
            border-radius: 14px;
            overflow: hidden;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(12px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        .pdf-viewer {
            width: 100%;
            height: 85vh;
            border: none;
            display: block;
        }

        @media (max-width: 768px) {
            .header {
                padding: 16px 16px 0;
            }

            .container {
                padding: 0 16px 20px;
            }

            .pdf-viewer {
                height: 72vh;
            }

            .back-link span {
                display: none;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <a href="/" class="back-link">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
            <span>Back to portfolio</span>
        </a>
        <div class="actions">
            <a href="/muzammil_cv.pdf" download class="download-btn">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                Download PDF
            </a>
        </div>
    </div>

    <div class="title-section">
        <h1>Muhammad Muzammil</h1>
        <p>Resume</p>
    </div>

    <div class="container">
        <div class="pdf-card">
            <embed src="/muzammil_cv.pdf" type="application/pdf" class="pdf-viewer">
        </div>
    </div>
</body>
</html>
